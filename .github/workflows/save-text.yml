name: SaveText Automation

on:
  push:
    branches: [main]
  schedule:
    # Run cleanup daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - cleanup
          - backup

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build and deploy to GitHub Pages
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g terser csso-cli html-minifier-terser

      - name: Minify CSS
        run: |
          for file in css/*.css; do
            csso "$file" -o "$file"
          done

      - name: Minify JavaScript
        run: |
          for file in js/*.js; do
            terser "$file" -o "$file" -c -m
          done

      - name: Minify HTML
        run: |
          for file in *.html; do
            html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --minify-css true \
              --minify-js true \
              -o "$file" "$file"
          done

      - name: Generate sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          echo '  <url>' >> sitemap.xml
          echo '    <loc>https://save-text.github.io/</loc>' >> sitemap.xml
          echo '    <changefreq>weekly</changefreq>' >> sitemap.xml
          echo '    <priority>1.0</priority>' >> sitemap.xml
          echo '  </url>' >> sitemap.xml
          echo '</urlset>' >> sitemap.xml

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Clean up expired texts
  cleanup:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'cleanup')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean expired texts
        run: |
          #!/bin/bash
          
          CURRENT_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DELETED_COUNT=0
          
          echo "Starting cleanup at $CURRENT_TIME"
          
          # Check each JSON file in data directory
          for file in data/*.json; do
            if [ -f "$file" ]; then
              # Extract expiry date if exists
              EXPIRY=$(jq -r '.expires // empty' "$file" 2>/dev/null)
              
              if [ -n "$EXPIRY" ]; then
                # Compare dates
                if [[ "$EXPIRY" < "$CURRENT_TIME" ]]; then
                  echo "Deleting expired file: $file (expired: $EXPIRY)"
                  rm "$file"
                  ((DELETED_COUNT++))
                fi
              fi
            fi
          done
          
          echo "Cleanup complete. Deleted $DELETED_COUNT expired files."
          echo "DELETED_COUNT=$DELETED_COUNT" >> $GITHUB_ENV

      - name: Commit changes
        if: env.DELETED_COUNT != '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "🧹 Cleanup: Removed ${{ env.DELETED_COUNT }} expired texts" || exit 0
          git push

  # Backup data to a separate branch
  backup:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'backup'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create backup
        run: |
          BACKUP_BRANCH="backup-$(date +%Y%m%d-%H%M%S)"
          BACKUP_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          # Create backup branch
          git checkout -b "$BACKUP_BRANCH"
          
          # Create backup manifest
          cat > BACKUP_MANIFEST.md << EOF
          # Backup Manifest
          
          - **Date**: $BACKUP_DATE
          - **Branch**: $BACKUP_BRANCH
          - **Files**: $(find data -name "*.json" | wc -l) texts
          - **Total Size**: $(du -sh data | cut -f1)
          
          ## Restoration
          
          To restore from this backup:
          \`\`\`bash
          git checkout $BACKUP_BRANCH -- data/
          \`\`\`
          EOF
          
          git add BACKUP_MANIFEST.md
          git commit -m "📦 Backup created at $BACKUP_DATE"
          git push origin "$BACKUP_BRANCH"
          
          echo "Backup created on branch: $BACKUP_BRANCH"

  # Generate statistics
  stats:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs: cleanup
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate statistics
        run: |
          #!/bin/bash
          
          STATS_FILE="data/stats.json"
          TOTAL_FILES=$(find data -name "*.json" ! -name "stats.json" | wc -l)
          TOTAL_SIZE=$(du -sb data | cut -f1)
          
          # Calculate total characters across all files
          TOTAL_CHARS=0
          for file in data/*.json; do
            if [ -f "$file" ] && [ "$file" != "$STATS_FILE" ]; then
              CHARS=$(jq -r '.content // "" | length' "$file" 2>/dev/null || echo 0)
              TOTAL_CHARS=$((TOTAL_CHARS + CHARS))
            fi
          done
          
          # Create stats file
          cat > "$STATS_FILE" << EOF
          {
            "lastUpdated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "totalTexts": $TOTAL_FILES,
            "totalSize": $TOTAL_SIZE,
            "totalCharacters": $TOTAL_CHARS
          }
          EOF
          
          echo "Statistics updated: $TOTAL_FILES texts, $TOTAL_SIZE bytes"

      - name: Commit statistics
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/stats.json
          git commit -m "📊 Update statistics" || exit 0
          git push
